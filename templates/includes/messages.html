{% if messages %}
<div class="container mx-auto px-4 mt-4">
    {% for message in messages %}
    <div class="p-4 rounded-lg mb-2 {% if message.tags == 'success' %}bg-green-900 border border-green-700 text-green-100{% elif message.tags == 'error' %}bg-red-900 border border-red-700 text-red-100{% else %}bg-blue-900 border border-blue-700 text-blue-100{% endif %} animate-fade-in">
        {{ message }}
    </div>
    {% endfor %}
</div>
{% endif %}
