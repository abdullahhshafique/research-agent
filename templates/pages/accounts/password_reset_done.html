{% extends 'base.html' %}

{% block title %}Email Sent - AI Research Agent{% endblock %}

{% block content %}
<div class="max-w-md mx-auto text-center py-12">
    <div class="card rounded-xl p-8">
        <div class="w-16 h-16 rounded-full bg-green-900 flex items-center justify-center mx-auto mb-6">
            <svg class="w-8 h-8 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
            </svg>
        </div>
        <h1 class="text-2xl font-bold mb-4">Check Your Email</h1>
        <p class="text-gray-400 mb-6">We've sent you instructions for resetting your password. You should receive them shortly.</p>
        <a href="{% url 'accounts:login' %}" class="text-blue-400 hover:underline">Back to Login</a>
    </div>
</div>
{% endblock %}
