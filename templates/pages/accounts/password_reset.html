{% extends 'base.html' %}

{% block title %}Reset Password - AI Research Agent{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <div class="card rounded-xl p-8">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold">Reset Password</h1>
            <p class="text-gray-400 mt-2">Enter your email to receive reset instructions</p>
        </div>

        <form method="post" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-medium mb-1">Email</label>
                <input type="email" name="email" class="form-input" placeholder="your@email.com" required>
            </div>
            <button type="submit" class="w-full py-3 rounded-lg bg-blue-500 hover:bg-blue-600 font-semibold transition">
                Send Reset Link
            </button>
        </form>

        <p class="text-center mt-6 text-gray-400">
            Remember your password? 
            <a href="{% url 'accounts:login' %}" class="text-blue-400 hover:underline">Sign in</a>
        </p>
    </div>
</div>
{% endblock %}
