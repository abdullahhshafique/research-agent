{% extends 'base.html' %}

{% block title %}Password Reset Complete - AI Research Agent{% endblock %}

{% block content %}
<div class="max-w-md mx-auto text-center py-12">
    <div class="card rounded-xl p-8">
        <div class="w-16 h-16 rounded-full bg-green-900 flex items-center justify-center mx-auto mb-6">
            <svg class="w-8 h-8 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
            </svg>
        </div>
        <h1 class="text-2xl font-bold mb-4">Password Reset Complete</h1>
        <p class="text-gray-400 mb-6">Your password has been set. You can now log in with your new password.</p>
        <a href="{% url 'accounts:login' %}" class="inline-block px-6 py-3 rounded-lg bg-blue-500 hover:bg-blue-600 font-semibold transition">
            Sign In
        </a>
    </div>
</div>
{% endblock %}
