{% extends 'base.html' %}

{% block title %}Set New Password - AI Research Agent{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <div class="card rounded-xl p-8">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold">Set New Password</h1>
            <p class="text-gray-400 mt-2">Enter your new password below</p>
        </div>
        
        <form method="post" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-medium mb-1">New Password</label>
                <input type="password" name="new_password1" class="form-input" required>
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">Confirm Password</label>
                <input type="password" name="new_password2" class="form-input" required>
            </div>
            <button type="submit" class="w-full py-3 rounded-lg bg-blue-500 hover:bg-blue-600 font-semibold transition">
                Reset Password
            </button>
        </form>
    </div>
</div>
{% endblock %}
