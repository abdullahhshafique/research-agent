{% extends 'base.html' %}

{% block title %}Report Preview - AI Research Agent{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto">
    <div class="flex items-center justify-between mb-6">
        <div>
            <h1 class="text-2xl font-bold">Report Preview</h1>
            <p class="text-gray-400">{{ research.query_text }}</p>
        </div>
        <div class="flex space-x-3">
            <a href="{% url 'reports:report_download' research.id %}" class="px-4 py-2 rounded-lg bg-blue-500 hover:bg-blue-600 transition flex items-center space-x-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                </svg>
                <span>Download PDF</span>
            </a>
            <a href="{% url 'research:research_status' research.id %}" class="px-4 py-2 rounded-lg border border-gray-600 hover:border-gray-400 transition">
                Back to Status
            </a>
        </div>
    </div>
    
    <div class="card rounded-xl p-8">
        <div class="prose max-w-none text-gray-300 whitespace-pre-wrap font-mono text-sm">
            {{ report }}
        </div>
    </div>
</div>
{% endblock %}
