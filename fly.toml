app = "ai-research-agent"
primary_region = "iad"
kill_signal = "SIGINT"
kill_timeout = 5

[build]

[env]
  PYTHON_VERSION = "3.12.0"
  DEBUG = "false"
  SECRET_KEY = "generate-a-secret-key-later"

[[services]]
  protocol = "tcp"
  internal_port = 8000
  processes = ["app"]

  [[services.ports]]
    handlers = ["http"]
    force_https = true
    port = 80

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [[services.tcp_checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "5s"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256

[mounts]
  source = "sqlite_data"
  destination = "/app/data"
