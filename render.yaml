services:
  - type: web
    name: ai-research-agent
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --threads 4"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: GROQ_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: ai-research-agent-db
          property: connectionString
      - key: DISABLE_COLLECTSTATIC
        value: "1"

databases:
  - name: ai-research-agent-db
    plan: free
    databaseName: ai_research_agent
    user: ai_research_agent